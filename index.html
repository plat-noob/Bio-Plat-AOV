<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plat•Cheat•AOV Links</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        body {
            /* Ảnh nền trong tệp hệ thống của bạn */
            background-image: url('Bg.JPG'); 
            background-repeat: no-repeat;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container {
            width: 100%;
            max-width: 450px;
            text-align: center;
            background: transparent; 
            box-shadow: none;
            border: none;
        }

        /* CHỮ PLAT•CHEAT•AOV TO HƠN + MÀU CẦU VỒNG TỪ PHẢI SANG TRÁI */
        .special-title {
            font-size: 2.3rem; /* Tăng kích thước to hơn đáng kể */
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 25px;
            transform: skew(-6deg); 
            
            /* Tạo dải màu cầu vồng chuyển sắc từ phải sang trái */
            background: linear-gradient(to left, #ff3838, #ff9f43, #feca57, #1dd1a1, #54a0ff, #5f27cd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            
            /* Hiệu ứng viền đen dày bao quanh để chữ cầu vồng nổi bần bật trên ảnh nền */
            filter: drop-shadow(-1.5px -1.5px 0 #000)
                    drop-shadow(1.5px -1.5px 0 #000)
                    drop-shadow(-1.5px 1.5px 0 #000)
                    drop-shadow(1.5px 1.5px 0 #000)
                    drop-shadow(0px 4px 8px rgba(0,0,0,0.8));
        }
        
        /* Vòng tròn chứa ảnh Avatar */
        .avatar-container {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }
        .avatar-circle {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 3px solid rgba(255, 255, 255, 0.9);
            overflow: hidden; 
            background: #203a43;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .avatar-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }
        
        /* 3 Icon Mạng Xã Hội */
        .social-icons {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-bottom: 35px;
        }
        .social-icons a {
            color: #fff;
            font-size: 2rem;
            transition: transform 0.2s, color 0.2s;
            text-decoration: none;
            filter: drop-shadow(0px 3px 5px rgba(0,0,0,0.8)); 
        }
        .social-icons a:hover { transform: scale(1.15); }
        .social-icons a.fb:hover { color: #1877f2; }
        .social-icons a.tele:hover { color: #0088cc; }
        .social-icons a.tiktok:hover { color: #010101; }

        /* DANH SÁCH MỤC NÚT BẤM KHUNG TRONG SUỐT XUYÊN THẤU HOÀN TOÀN */
        .links-list {
            display: flex;
            flex-direction: column;
            gap: 20px; 
            padding: 0 5px;
        }
        .link-item {
            display: block;
            text-decoration: none;
            font-weight: 800;
            font-size: 1.3rem; 
            padding: 16px;
            border-radius: 20px; 
            transition: all 0.25s ease;
            
            /* TRONG SUỐT HOÀN TOÀN */
            background: transparent; 
            border: 2px solid rgba(255, 255, 255, 0.8); 
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.4); 
        }
        .link-item:hover {
            transform: translateY(-3px); 
            background: rgba(255, 255, 255, 0.15); 
            border-color: #fff;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.6);
        }

        /* Chữ ĐỎ 3D Viền Đen cực nổi trên ảnh nền */
        .text-red {
            color: #ff3838;
            text-shadow: 
                -1.5px -1.5px 0 #000,  
                 1.5px -1.5px 0 #000,
                -1.5px  1.5px 0 #000,
                 1.5px  1.5px 0 #000,
                 0 3px 5px rgba(0,0,0,0.9);
        }
        /* Chữ XANH DƯƠNG 3D Viền Đen cực nổi trên ảnh nền */
        .text-blue {
            color: #3897ff;
            text-shadow: 
                -1.5px -1.5px 0 #000,  
                 1.5px -1.5px 0 #000,
                -1.5px  1.5px 0 #000,
                 1.5px  1.5px 0 #000,
                 0 3px 5px rgba(0,0,0,0.9);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="special-title">Plat•Cheat•AOV</div>

    <div class="avatar-container">
        <div class="avatar-circle">
            <img src="avatar.WEBP" alt="Avatar" class="avatar-image">
        </div>
    </div>
    
    <div class="social-icons">
        <a href="https://facebook.com/your-profile" target="_blank" class="fb" title="Facebook"><i class="fab fa-facebook"></i></a>
        <a href="https://t.me/your-username" target="_blank" class="tele" title="Telegram"><i class="fab fa-telegram"></i></a>
        <a href="https://tiktok.com/@your-username" target="_blank" class="tiktok" title="TikTok"><i class="fab fa-tiktok"></i></a>
    </div>

    <div class="links-list">
        <a href="https://link-lien-he-admin.com" target="_blank" class="link-item text-red">📱 Liên Hệ Admin 📱</a>
        <a href="https://link-tai-game.com" target="_blank" class="link-item text-blue">🎮 Tải Game Tại Đây 🎮</a>
    </div>
</div>

</body>
</html>
