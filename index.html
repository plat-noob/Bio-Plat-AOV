<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plat•Cheat•AOV Links</title>
    <!-- FontAwesome cho icon mạng xã hội -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        body {
            /* Ảnh nền trong tệp hệ thống của bạn */
            background-image: url('Bg.JPG'); 
            background-repeat: no-repeat;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            /* Đẩy toàn bộ nội dung thấp xuống bằng 15% chiều cao màn hình để lộ mặt ảnh nền */
            padding: 15vh 20px 40px 20px; 
        }
        .container {
            width: 100%;
            max-width: 450px;
            text-align: center;
            background: transparent; 
            box-shadow: none;
            border: none;
            display: flex;
            flex-direction: column;
            align-items: center; /* Căn giữa tất cả thành phần con */
        }

        /* CHỮ PLAT•CHEAT•AOV TO NỔI BẬT */
        .special-title {
            font-size: 2.3rem; 
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 12px; 
            transform: skew(-6deg); 
            
            /* Dải màu cầu vồng chuyển sắc từ phải sang trái */
            background: linear-gradient(to left, #ff3838, #ff9f43, #feca57, #1dd1a1, #54a0ff, #5f27cd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            
            /* Viền chữ đen dày bao quanh */
            filter: drop-shadow(-1.5px -1.5px 0 #000)
                    drop-shadow(1.5px -1.5px 0 #000)
                    drop-shadow(-1.5px 1.5px 0 #000)
                    drop-shadow(1.5px 1.5px 0 #000)
                    drop-shadow(0px 4px 8px rgba(0,0,0,0.8));
        }
        
        /* 3 ICON MẠNG XÃ HỘI */
        .social-icons {
            display: flex;
            justify-content: center;
            gap: 28px; 
            margin-bottom: 30px; 
        }
        .social-icons a {
            color: rgba(255, 255, 255, 0.7); 
            font-size: 2.4rem; 
            transition: all 0.25s ease;
            text-decoration: none;
            filter: drop-shadow(0px 4px 6px rgba(0,0,0,0.6)); 
        }
        .social-icons a:hover { 
            transform: scale(1.15); 
            color: rgba(255, 255, 255, 1); 
        }

        /* DANH SÁCH MỤC NÚT BẤM BÉ LẠI, HÌNH CHỮ NHẬT BO TRÒN 4 GÓC */
        .links-list {
            display: flex;
            flex-direction: column;
            gap: 16px; 
            width: 100%;
            max-width: 320px; /* Thu hẹp chiều rộng nút bấm bé lại gọn gàng hơn */
            margin-bottom: 25px; 
        }
        .link-item {
            display: block;
            text-decoration: none;
            font-weight: 800;
            font-size: 1.1rem; /* Giảm nhẹ cỡ chữ cho cân đối với nút nhỏ */
            padding: 12px 16px; /* Thu gọn khoảng đệm bên trong nút */
            border-radius: 10px; /* Bo tròn 4 góc nhẹ nhàng kiểu hình chữ nhật tinh tế */
            transition: all 0.25s ease;
            
            /* TRONG SUỐT HOÀN TOÀN */
            background: transparent; 
            border: 2px solid rgba(255, 255, 255, 0.85); 
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.4); 
        }
        .link-item:hover {
            transform: translateY(-2px); 
            background: rgba(255, 255, 255, 0.15); 
            border-color: #fff;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.6);
        }

        /* Chữ ĐỎ 3D Viền Đen */
        .text-red {
            color: #ff3838;
            text-shadow: 
                -1.5px -1.5px 0 #000,  
                 1.5px -1.5px 0 #000,
                -1.5px  1.5px 0 #000,
                 1.5px  1.5px 0 #000,
                 0 3px 5px rgba(0,0,0,0.9);
        }
        /* Chữ XANH DƯƠNG 3D Viền Đen */
        .text-blue {
            color: #3897ff;
            text-shadow: 
                -1.5px -1.5px 0 #000,  
                 1.5px -1.5px 0 #000,
                -1.5px  1.5px 0 #000,
                 1.5px  1.5px 0 #000,
                 0 3px 5px rgba(0,0,0,0.9);
        }

        /* AVATAR HÌNH VUÔNG DƯỚI CÙNG */
        .avatar-container {
            display: flex;
            justify-content: center;
            margin-top: 10px;
        }
        .avatar-square {
            width: 100px;
            height: 100px;
            border-radius: 14px; /* Bo góc nhẹ đồng bộ với nút bấm */
            display: flex;
            justify-content: center;
            align-items: center;
            border: 3px solid rgba(255, 255, 255, 0.9);
            overflow: hidden; 
            background: #203a43;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .avatar-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- 1. Chữ PLAT•CHEAT•AOV trên cùng -->
    <div class="special-title">Plat•Cheat•AOV</div>

    <!-- 2. 3 Icon mạng xã hội ngay dưới chữ -->
    <div class="social-icons">
        <a href="https://facebook.com/your-profile" target="_blank" class="fb" title="Facebook"><i class="fab fa-facebook"></i></a>
        <a href="https://t.me/your-username" target="_blank" class="tele" title="Telegram"><i class="fab fa-telegram"></i></a>
        <a href="https://tiktok.com/@your-username" target="_blank" class="tiktok" title="TikTok"><i class="fab fa-tiktok"></i></a>
    </div>

    <!-- 3. Hai mục dạng chữ nhật nhỏ hơn, khung viền trắng trong suốt -->
    <div class="links-list">
        <a href="https://link-lien-he-admin.com" target="_blank" class="link-item text-red">📱 Liên Hệ Admin 📱</a>
        <a href="https://link-tai-game.com" target="_blank" class="link-item text-blue">🎮 Tải Game Tại Đây 🎮</a>
    </div>

    <!-- 4. Ảnh đại diện hình vuông bo góc nằm dưới cùng -->
    <div class="avatar-container">
        <div class="avatar-square">
            <img src="avatar.WEBP" alt="Avatar" class="avatar-image">
        </div>
    </div>
</div>

</body>
</html>
