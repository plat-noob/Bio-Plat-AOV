<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Bio Links</title>
    <!-- FontAwesome để lấy các icon mạng xã hội và game -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 450px;
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }
        .profile-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid #fff;
            margin-bottom: 15px;
            object-fit: cover;
        }
        h1 {
            font-size: 1.5rem;
            margin-bottom: 5px;
        }
        p {
            font-size: 0.9rem;
            color: #ccc;
            margin-bottom: 25px;
        }
        
        /* 3 Icon Mạng Xã Hội Gốc */
        .social-icons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 25px;
        }
        .social-icons a {
            color: #fff;
            font-size: 1.8rem;
            transition: transform 0.3s, color 0.3s;
        }
        .social-icons a:hover { transform: scale(1.2); }
        .social-icons a.fb:hover { color: #1877f2; }
        .social-icons a.tele:hover { color: #0088cc; }
        .social-icons a.tiktok:hover { color: #010101; }

        /* Vùng bổ sung mới: Tên Plat•Cheat•AOV & 3 Icon mới */
        .special-section {
            margin-bottom: 30px;
            background: rgba(0, 0, 0, 0.2);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .special-title {
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 1px;
            color: #ffdf00; /* Màu vàng nổi bật */
            margin-bottom: 12px;
        }
        .new-icons {
            display: flex;
            justify-content: center;
            gap: 25px;
        }
        .new-icons a {
            color: #fff;
            font-size: 1.6rem;
            transition: all 0.3s ease;
        }
        .new-icons a:hover {
            transform: scale(1.2) rotate(5deg);
            color: #23d5ab;
        }

        /* 6 Danh Sách Link */
        .links-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .link-item {
            display: block;
            background: #fff;
            color: #333;
            text-decoration: none;
            padding: 15px;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .link-item:hover {
            background: #23d5ab;
            color: #fff;
            transform: translateY(-3px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Ảnh đại diện -->
    <img src="https://via.placeholder.com/100" alt="Avatar" class="profile-img">
    
    <h1>Xin chào, Mình là [Tên Của Bạn]</h1>
    <p>Chào mừng bạn đến với trang liên kết của mình!</p>

    <!-- 3 Icon Mạng Xã Hội Gốc -->
    <div class="social-icons">
        <a href="https://facebook.com/your-profile" target="_blank" class="fb" title="Facebook"><i class="fab fa-facebook"></i></a>
        <a href="https://t.me/your-username" target="_blank" class="tele" title="Telegram"><i class="fab fa-telegram"></i></a>
        <a href="https://tiktok.com/@your-username" target="_blank" class="tiktok" title="TikTok"><i class="fab fa-tiktok"></i></a>
    </div>

    <!-- PHẦN BỔ SUNG: Tên Plat•Cheat•AOV và 3 icon xếp hàng ngang -->
    <div class="special-section">
        <div class="special-title">Plat•Cheat•AOV</div>
        <div class="new-icons">
            <!-- Icon 1 (Ví dụ: Tay cầm chơi game) -->
            <a href="https://link-nen-tang-1.com" target="_blank" title="Nền tảng 1"><i class="fas fa-gamepad"></i></a>
            <!-- Icon 2 (Ví dụ: Khiên bảo mật / Phần mềm) -->
            <a href="https://link-nen-tang-2.com" target="_blank" title="Nền tảng 2"><i class="fas fa-shield-alt"></i></a>
            <!-- Icon 3 (Ví dụ: Mã code / Hệ thống) -->
            <a href="https://link-nen-tang-3.com" target="_blank" title="Nền tảng 3"><i class="fas fa-code"></i></a>
        </div>
    </div>

    <!-- 6 Danh sách Link liên kết -->
    <div class="links-list">
        <a href="https://google.com" target="_blank" class="link-item">🌐 Trang web cá nhân / Blog</a>
        <a href="https://youtube.com" target="_blank" class="link-item">📺 Kênh YouTube của mình</a>
        <a href="https://shopee.vn" target="_blank" class="link-item">🛒 Cửa hàng Shopee</a>
        <a href="https://github.com" target="_blank" class="link-item">💻 Dự án GitHub</a>
        <a href="https://linkedin.com" target="_blank" class="link-item">💼 Hồ sơ LinkedIn</a>
        <a href="https://instagram.com" target="_blank" class="link-item">📸 Hình ảnh trên Instagram</a>
    </div>
</div>

</body>
</html>
