        .container {
            width: 100%;

        /* HIỆU ỨNG CHỮ 3D GAMING ĐƯA LÊN TRÊN CÙNG */
        .special-title {

            margin-bottom: 25px;

                -1px  1px 0 #000,

        }
        
        /* Giao diện vòng tròn chứa ảnh Avatar */
        .avatar-container {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }
        .avatar-circle {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 3px solid rgba(255, 255, 255, 0.9);
            overflow: hidden; 
            background: #203a43;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .avatar-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }
        
        /* 3 Icon Mạng Xã Hội */
        .social-icons {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-bottom: 30px;
        }
        .social-icons a {
            color: #fff;
            font-size: 2rem;
            transition: transform 0.2s, color 0.2s;
            text-decoration: none;
            filter: drop-shadow(0px 3px 5px rgba(0,0,0,0.8)); 
        }
        .social-icons a:hover { transform: scale(1.15); }
        .social-icons a.fb:hover { color: #1877f2; }
        .social-icons a.tele:hover { color: #0088cc; }
        .social-icons a.tiktok:hover { color: #010101; }

        /* KHUNG TRONG SUỐT CHỨA CÁC MỤC */
        .link-group-box {
            background: rgba(255, 255, 255, 0.12); /* Nền trong suốt mờ nhẹ */
            border: 1px solid rgba(255, 255, 255, 0.2); /* Viền mảnh trong suốt */
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 25px; /* Khoảng cách giữa 2 nhóm khung */
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        /* Nút bấm chữ nổi */
        .link-item {
            display: block;
            background: #ffffff;
            text-decoration: none;
            padding: 15px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1.1rem;
            color: #2c3e50; /* Màu mặc định cho các mục hack */
            transition: all 0.25s ease;
            /* Tạo hiệu ứng chữ nổi bằng bóng text-shadow */
            text-shadow: 0.5px 0.5px 0px rgba(0,0,0,0.2);
            box-shadow: 0 4px 8px rgba(0,0,0,0.15);
        }
        .link-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 14px rgba(0,0,0,0.3);
            filter: brightness(1.05);
        }

        /* Màu chữ ĐỎ nổi bật cho Admin */
