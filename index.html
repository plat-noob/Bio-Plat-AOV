<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Plat•Cheat•AOV Links</title>
    <!-- FontAwesome cho icon mạng xã hội -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        html, body {
            height: 100vh;
            width: 100vw;
            /* Khóa cuộn trang hoàn toàn để không bao giờ bị kéo lòi khoảng trắng */
            overflow: hidden; 
        }
        body {
            /* Ảnh nền hệ thống của bạn */
            background-image: url('Bg.JPG'); 
            background-repeat: no-repeat;
            /* Ép ảnh kéo dãn phủ kín chuẩn 100% toàn màn hình điện thoại */
            background-size: 100% 100%; 
            background-position: center;
            
            color: #fff;
            display: flex;
            justify-content: center;
        }
        
        /* CONTAINER CHÍNH */
        .container {
            width: 100%;
            max-width: 450px;
            position: relative;
            height: 100vh;
            padding: 0 20px;
        }

        /* KHU VỰC ĐỈNH ĐẦU (CHỮ + ICON MẠNG XÃ HỘI) */
        .header-section {
            position: absolute;
            top: 40px; 
            left: 0;
            width: 100%;
            text-align: center;
            padding: 0 20px;
        }

        /* CHỮ PLAT•CHEAT•AOV CẦU VỒNG THU NGẮN */
        .special-title {
            font-size: 2.3rem; 
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 12px; 
            display: inline-block;
            transform: skew(-6deg) scaleX(0.85); 
            
            background: linear-gradient(to left, #ff3838, #ff9f43, #feca57, #1dd1a1, #54a0ff, #5f27cd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            
            filter: drop-shadow(-1.5px -1.5px 0 #000)
                    drop-shadow(1.5px -1.5px 0 #000)
                    drop-shadow(-1.5px 1.5px 0 #000)
                    drop-shadow(1.5px 1.5px 0 #000)
                    drop-shadow(0px 4px 8px rgba(0,0,0,0.8));
        }
        
        /* 3 ICON MẠNG XÃ HỘI TRONG SUỐT */
        .social-icons {
            display: flex;
            justify-content: center;
            gap: 28px; 
        }
        .social-icons a {
            color: rgba(255, 255, 255, 0.7); 
            font-size: 2.4rem; 
            transition: all 0.25s ease;
            text-decoration: none;
            filter: drop-shadow(0px 4px 6px rgba(0,0,0,0.6)); 
        }
        .social-icons a:hover { 
            transform: scale(1.15); 
            color: rgba(255, 255, 255, 1); 
        }

        /* KHU VỰC NÚT BẤM KHUNG TRONG SUỐT - ĐÃ ĐẨY LÊN THÊM 1 TÍ */
        .links-list {
            position: absolute;
            bottom: 300px; /* Đã tăng từ 265px lên 300px */
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            gap: 14px; 
            width: 100%;
            max-width: 310px; 
            text-align: center;
        }
        .link-item {
            display: block;
            text-decoration: none;
            font-weight: 800;
            font-size: 1.1rem; 
            padding: 12px 16px; 
            border-radius: 10px; 
            transition: all 0.25s ease;
            
            background: transparent; 
            border: 2px solid rgba(255, 255, 255, 0.85); 
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.4); 
        }
        .link-item:hover {
            transform: translateY(-2px); 
            background: rgba(255, 255, 255, 0.15); 
            border-color: #fff;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.6);
        }

        /* Chữ ĐỎ 3D */
        .text-red {
            color: #ff3838;
            text-shadow: 
                -1.5px -1.5px 0 #000,  
                 1.5px -1.5px 0 #000,
                -1.5px  1.5px 0 #000,
                 1.5px  1.5px 0 #000,
                 0 3px 5px rgba(0,0,0,0.9);
        }
        /* Chữ XANH DƯƠNG 3D */
        .text-blue {
            color: #3897ff;
            text-shadow: 
                -1.5px -1.5px 0 #000,  
                 1.5px -1.5px 0 #000,
                -1.5px  1.5px 0 #000,
                 1.5px  1.5px 0 #000,
                 0 3px 5px rgba(0,0,0,0.9);
        }

        /* AVATAR VUÔNG - ĐÃ ĐẨY LÊN THÊM CAO HƠN THANH ĐỊA CHỈ */
        .avatar-container {
            position: absolute;
            bottom: 90px; /* Đã tăng từ 45px lên 90px để thoáng chân */
            left: 50%;
            transform: translateX(-50%);
        }
        .avatar-square {
            width: 95px;
            height: 95px;
            border-radius: 14px; 
            display: flex;
            justify-content: center;
            align-items: center;
            border: 3px solid rgba(255, 255, 255, 0.9);
            overflow: hidden; 
            background: #203a43;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .avatar-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Phần 1: Chữ cầu vồng ngắn gọn + icon mạng xã hội đỉnh đầu -->
    <div class="header-section">
        <div class="special-title">Plat•Cheat•AOV</div>
        <div class="social-icons">
            <a href="https://facebook.com/your-profile" target="_blank" class="fb" title="Facebook"><i class="fab fa-facebook"></i></a>
            <a href="https://t.me/your-username" target="_blank" class="tele" title="Telegram"><i class="fab fa-telegram"></i></a>
            <a href="https://tiktok.com/@your-username" target="_blank" class="tiktok" title="TikTok"><i class="fab fa-tiktok"></i></a>
        </div>
    </div>

    <!-- Phần 2: Hai nút bấm xuyên thấu vị trí ngực/bụng (Đã nâng cao) -->
    <div class="links-list">
        <a href="https://link-lien-he-admin.com" target="_blank" class="link-item text-red">📱 Liên Hệ Admin 📱</a>
        <a href="https://link-tai-game.com" target="_blank" class="link-item text-blue">🎮 Tải Game Tại Đây 🎮</a>
    </div>

    <!-- Phần 3: Avatar vuông (Đã nâng cao để tránh bị che) -->
    <div class="avatar-container">
        <div class="avatar-square">
            <img src="avatar.WEBP" alt="Avatar" class="avatar-image">
        </div>
    </div>
</div>

</body>
</html>
