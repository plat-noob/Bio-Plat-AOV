<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plat•Cheat•AOV Links</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        body {
            /* Ảnh nền trong tệp hệ thống của bạn */
            background-image: url('Bg.JPG'); 
            background-repeat: no-repeat;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container {
            width: 100%;
            max-width: 450px;
            text-align: center;
            background: transparent; 
            box-shadow: none;
            border: none;
        }

        /* CHỮ PLAT•CHEAT•AOV 3D TRÊN CÙNG */
        .special-title {
            font-size: 1.9rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #ffdf00; 
            margin-bottom: 25px;
            text-shadow: 
                -1px -1px 0 #000,  
                 1px -1px 0 #000,
                -1px  1px 0 #000,
                 1px  1px 0 #000,
                 0 1px 0 #c7a200,
                 0 2px 0 #b39200,
                 0 3px 0 #9e8100,
                 0 4px 0 #8a7000,
                 0 5px 8px rgba(0,0,0,0.6),
                 0 8px 15px rgba(0,0,0,0.8);
            transform: skew(-6deg); 
        }
        
        /* Vòng tròn chứa ảnh Avatar */
        .avatar-container {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }
        .avatar-circle {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 3px solid rgba(255, 255, 255, 0.9);
            overflow: hidden; 
            background: #203a43;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .avatar-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }
        
        /* 3 Icon Mạng Xã Hội */
        .social-icons {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-bottom: 35px;
        }
        .social-icons a {
            color: #fff;
            font-size: 2rem;
            transition: transform 0.2s, color 0.2s;
            text-decoration: none;
            filter: drop-shadow(0px 3px 5px rgba(0,0,0,0.8)); 
        }
        .social-icons a:hover { transform: scale(1.15); }
        .social-icons a.fb:hover { color: #1877f2; }
        .social-icons a.tele:hover { color: #0088cc; }
        .social-icons a.tiktok:hover { color: #010101; }

        /* DANH SÁCH MỤC NÚT BẤM KÍNH TRONG SUỐT (LIQUID GLASS) */
        .links-list {
            display: flex;
            flex-direction: column;
            gap: 20px; /* Khoảng cách giữa các nút */
            padding: 0 5px;
        }
        .link-item {
            display: block;
            text-decoration: none;
            font-weight: 800;
            font-size: 1.25rem; 
            padding: 16px;
            border-radius: 16px;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            
            /* HIỆU ỨNG LIQUID GLASS */
            background: rgba(255, 255, 255, 0.12); /* Nền kính trong suốt */
            border: 1px solid rgba(255, 255, 255, 0.25); /* Viền kính phản chiếu */
            box-shadow: 
                0 4px 15px rgba(0, 0, 0, 0.2), 
                inset 0 0 10px rgba(255, 255, 255, 0.1); /* Bóng đổ bên trong mượt mà */
            backdrop-filter: blur(10px); /* Làm mờ kính
