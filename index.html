    <style>
        * {

            padding: 0;
            box-sizing: border-box;
            font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        body {
            /* Đường dẫn ảnh nền đã cài ở bước trước (ví dụ background.jpg) */
            background-image: url('background.jpg'); 
            background-repeat: no-repeat;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 450px;
            text-align: center;
            /* Đã XOÁ làm mờ (backdrop-filter), chỉ giữ nền đen trong suốt nhẹ để nổi bật nút bấm */
            background: rgba(0, 0, 0, 0.4); 
            padding: 30px 20px;
            border-radius: 24px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        /* Giao diện vòng tròn chứa ảnh Avatar từ tệp hệ thống */
        .avatar-container {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }
        .avatar-circle {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 3px solid rgba(255, 255, 255, 0.8);
            overflow: hidden; 
            background: #203a43;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .avatar-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }
        
        /* 3 Icon Mạng Xã Hội */
        .social-icons {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-bottom: 20px;
        }
        .social-icons a {
            color: #fff;
            font-size: 1.8rem;
            transition: transform 0.2s, color 0.2s;
            text-decoration: none;
        }
        .social-icons a:hover { transform: scale(1.15); }
        .social-icons a.fb:hover { color: #1877f2; }
        .social-icons a.tele:hover { color: #0088cc; }
        .social-icons a.tiktok:hover { color: #010101; }

        /* HIỆU ỨNG CHỮ THỂ THAO 3D CHO PLAT•CHEAT•AOV */
        .special-title {
            font-size: 1.6rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #ffdf00; /* Màu vàng gốc */
            margin-bottom: 25px;
            /* Tạo khối đổ bóng 3D dày xuống dưới */
            text-shadow: 
                0 1px 0 #c7a200,
                0 2px 0 #b39200,
                0 3px 0 #9e8100,
                0 4px 0 #8a7000,
                0 5px 0 rgba(0,0,0,0.4),
                0 6px 10px rgba(0,0,0,0.6);
            transform: skew(-5deg); /* Hơi nghiêng nhẹ cho đậm chất gaming */
        }

        /* Danh Sách Link */
        .links-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .link-item {
            display: block;
            background: #fff;
            color: #2c3e50;
            text-decoration: none;
            padding: 16px;
            border-radius: 14px;
            font-weight: 600;
            font-size: 1.05rem;
            transition: all 0.25s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.15);
        }
        .link-item:hover {
            background: #23d5ab;
            color: #fff;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.25);
        }
        /* Style riêng cho nút Admin màu vàng rực rỡ giống ảnh mẫu */
        .admin-btn {
            background: #ffdf00;
            color: #111;
        }
        .admin-btn:hover {
            background: #ffaa00;
            color: #fff;
        }
    </style>
</head>
