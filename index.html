            align-items: flex-start; /* Cho nội dung bắt đầu từ phía trên */

        /* Giao diện vòng tròn chứa ảnh Avatar từ tệp hệ thống */
        .avatar-container {

            margin-bottom: 20px;
        }
        .avatar-circle {
            width: 110px; /* Tăng kích thước nhẹ cho avatar nổi bật */

            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 3px solid rgba(255, 255, 255, 0.9);
            overflow: hidden; 
            background: #203a43;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }
        .avatar-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }
        
        /* 3 Icon Mạng Xã Hội */
        .social-icons {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-bottom: 20px;
        }
        .social-icons a {
            color: #fff;
            font-size: 2rem;
            transition: transform 0.2s, color 0.2s;
            text-decoration: none;
            /* Đổ bóng nhẹ phía sau icon để dễ nhìn thấy trên ảnh nền */
            filter: drop-shadow(0px 2px 4px rgba(0,0,0,0.6)); 
        }
        .social-icons a:hover { transform: scale(1.15); }
        .social-icons a.fb:hover { color: #1877f2; }
        .social-icons a.tele:hover { color: #0088cc; }
        .social-icons a.tiktok:hover { color: #010101; }

        /* HIỆU ỨNG CHỮ THỂ THAO 3D CHO PLAT•CHEAT•AOV */
        .special-title {
            font-size: 1.8rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #ffdf00; 
            margin-bottom: 25px;
            text-shadow: 
                0 1px 0 #c7a200,
                0 2px 0 #b39200,
                0 3px 0 #9e8100,
                0 4px 0 #8a7000,
                0 5px 0 rgba(0,0,0,0.5),
                0 6px 12px rgba(0,0,0,0.7);
            transform: skew(-5deg); 
        }

        /* Danh Sách Link */
        .links-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .link-item {
            display: block;
            background: #fff;
            color: #2c3e50;
            text-decoration: none;
            padding: 16px;
            border-radius: 14px;
            font-weight: 600;
            font-size: 1.05rem;
            transition: all 0.25s ease;
            box-shadow: 0 4px 8px rgba(0,0,0,0.25);
        }
        .link-item:hover {
            background: #23d5ab;
            color: #fff;
            transform: translateY(-2px);
            box-shadow: 0 6px 14px rgba(0,0,0,0.35);
        }
        /* Style riêng cho nút Admin màu vàng rực rỡ */
        .admin-btn {
            background: #ffdf00;
            color: #111;
        }

            color: #fff;
        }
    </style>
