<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plat•Cheat•AOV Links</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 450px;
            text-align: center;
            background: rgba(255, 255, 255, 0.08);
            padding: 30px 20px;
            border-radius: 24px;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        /* Giao diện vòng tròn chứa ảnh Avatar */
        .avatar-container {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }
        .avatar-circle {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 3px solid rgba(255, 255, 255, 0.6);
            overflow: hidden; 
            background: #203a43;
        }
        .avatar-image {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Giúp ảnh không bị móp, tự động vuông vắn trong vòng tròn */
            border-radius: 50%;
        }
        
        /* 3 Icon Mạng Xã Hội */
        .social-icons {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-bottom: 20px;
        }
        .social-icons a {
            color: #fff;
            font-size: 1.8rem;
            transition: transform 0.2s, color 0.2s;
            text-decoration: none;
        }
        .social-icons a:hover { transform: scale(1.15); }
        .social-icons a.fb:hover { color: #1877f2; }
        .social-icons a.tele:hover { color: #0088cc; }
        .social-icons a.tiktok:hover { color: #010101; }

        /* Tiêu đề Plat•Cheat•AOV */
        .special-title {
            font-size: 1.3rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            color: #ffdf00;
            margin-bottom: 25px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        /* Danh Sách Link */
        .links-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .link-item {
            display: block;
            background: #fff;
            color: #2c3e50;
            text-decoration: none;
            padding: 16px;
            border-radius: 14px;
            font-weight: 600;
            font-size: 1.05rem;
            transition: all 0.25s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.15);
        }
        .link-item:hover {
            background: #23d5ab;
            color: #fff;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.25);
        }
        /* Style riêng cho nút Admin nổi bật */
        .admin-btn {
            background: #ffdf00;
            color: #111;
        }
        .admin-btn:hover {
            background: #ffaa00;
            color: #fff;
        }
    </style>
</head>
<body>

<div class="container">

        </div>
    </div>
    
    <div class="social-icons">

        <a href="https://tiktok.com/@your-username" target="_blank" class="tiktok" title="TikTok"><i class="fab fa-tiktok"></i></a>
